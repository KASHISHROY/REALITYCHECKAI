services:
  backend:
    build: .
    ports:
      - "7000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/acme
      SESSION_SECRET: dev-session-secret
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: acme
